<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alertas enviadas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    {% include 'navbar.html' %}
    <div class="container py-3">
      <h1 class="mb-4">Alertas enviadas</h1>

      {% if target %}
        <p>
          Chat objetivo configurado: <strong>{{ target }}</strong>
        </p>
      {% endif %}

      {% if not alerts %}
        <div class="alert alert-info">
          No hay alertas registradas.
        </div>
      {% else %}
        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nivel</th>
                <th>Título</th>
              </tr>
            </thead>
            <tbody>
              {% for a in alerts %}
                <tr>
                  <td>{{ a.id }}</td>
                  <td>{{ a.level }}</td>
                  <td>{{ a.title }}</td>
                </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      {% endif %}

    </div>
  </body>
</html>
