<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador de Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    {% include 'navbar.html' %}
    <div class="container py-3">
      <h1 class="mb-4">Feed en tiempo real</h1>
      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#filterModal">Filtros</button>
      </div>
      <div class="d-flex gap-2 mb-3 align-items-center">
        <div class="btn-group" role="group" aria-label="Ordenamiento">
          <button id="sort-pub" class="btn btn-outline-primary btn-sm sort-btn" data-field="published_at" aria-pressed="false">Publicado <span class="sort-arrow">↓</span></button>
          <button id="sort-ext" class="btn btn-outline-secondary btn-sm sort-btn" data-field="extracted_at" aria-pressed="false">Extraído <span class="sort-arrow"></span></button>
        </div>
        <div class="ms-3 small text-muted">
          Orden actual: <span id="current-sort">Publicado ↓</span>
        </div>
      </div>

      <div class="modal fade" id="filterModal" tabindex="-1" aria-labelledby="filterModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="filterModalLabel">Filtros de búsqueda</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
              <div class="row g-2 align-items-end">
                <div class="col-md-4">
                  <label class="form-label">Buscar</label>
                  <input id="filter-search" class="form-control" placeholder="Título o resumen..." />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Nivel (nivel de prioridad)</label>
                  <div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="checkbox" id="lvl_alto" value="alto" /><label class="form-check-label" for="lvl_alto">alto</label>
                    </div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="checkbox" id="lvl_medio" value="medio" /><label class="form-check-label" for="lvl_medio">medio</label>
                    </div>
                    <div class="form-check form-check-inline">
                      <input class="form-check-input" type="checkbox" id="lvl_bajo" value="bajo" /><label class="form-check-label" for="lvl_bajo">bajo</label>
                    </div>
                  </div>
                </div>
                <div class="col-md-2">
                  <label class="form-label">Origen (fuente de información)</label>
                  <select id="filter-origin" class="form-select">
                    <option value="all">Todos</option>
                    <option value="monitor">Monitor</option>
                    <option value="telegram_search">Telegram (busqueda)</option>
                    <option value="telegram_add">Telegram (agregado)</option>
                    <option value="desconocido">Desconocido</option>
                  </select>
                </div>
                <div class="col-md-2">
                  <label class="form-label">Fuente</label>
                  <input id="filter-source" class="form-control" placeholder="Fuente (ej. NewsAPI, YouTube...)" />
                </div>

                <div class="col-md-2 text-end">
                </div>
              </div>
              <div class="row g-2 mt-2">
                <div class="col">
                  <label class="form-label">Publicado</label>
                  <select id="filter-pub-range" class="form-select">
                    <option value="all">Todos</option>
                    <option value="today">Hoy</option>
                    <option value="week">Esta semana</option>
                    <option value="month">Este mes</option>
                    <option value="custom">Rango personalizado</option>
                  </select>
                </div>
                <div class="col">
                  <label class="form-label">Publicado desde</label>
                  <input id="filter-pub-from" type="date" class="form-control" style="display:none" />
                </div>
                <div class="col">
                  <label class="form-label">Publicado hasta</label>
                  <input id="filter-pub-to" type="date" class="form-control" style="display:none" />
                </div>
              </div>

              <div class="row mt-2">
                <div class="col">
                  <label class="form-label">Extraído</label>
                  <select id="filter-ext-range" class="form-select">
                    <option value="all">Todos</option>
                    <option value="today">Hoy</option>
                    <option value="week">Esta semana</option>
                    <option value="month">Este mes</option>
                    <option value="custom">Rango personalizado</option>
                  </select>
                </div>
                <div class="col">
                  <label class="form-label">Extraído desde</label>
                  <input id="filter-ext-from" type="date" class="form-control" style="display:none" />
                </div>
                <div class="col">
                  <label class="form-label">Extraído hasta</label>
                  <input id="filter-ext-to" type="date" class="form-control" style="display:none" />
                </div>
              </div>
            </div>
            <div class="modal-footer">
                  <button id="filter-apply" class="btn btn-primary">Aplicar</button>
                  <button id="filter-reset" class="btn btn-link">Reiniciar</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
          </div>
        </div>
      </div>
      <div id="live-feed" class="mb-3">
        <div class="list-group" id="live-list">
        </div>
        <nav class="d-flex justify-content-between align-items-center mt-3" aria-label="Paginación">
          <div>
            <button id="pagination-prev" class="btn btn-outline-secondary btn-sm">Anterior</button>
            <button id="pagination-next" class="btn btn-outline-secondary btn-sm">Siguiente</button>
          </div>
          <div class="text-muted small" id="pagination-info">Página 1</div>
        </nav>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

      <script>
        const liveList = document.getElementById('live-list')
        let allItems = []
        let sortField = 'published_at'
        let sortDir = 'desc'
        
        function zeroPad(n) {
          return String(n).padStart(2, '0')
        }
        function formatDate(iso) {
          if (!iso) return ''
          try {
            const d = new Date(iso)
            if (isNaN(d.getTime())) return ''
            const hh = zeroPad(d.getHours())
            const mm = zeroPad(d.getMinutes())
            const dd = zeroPad(d.getDate())
            const mo = zeroPad(d.getMonth() + 1)
            const yy = d.getFullYear()
            return `${hh}:${mm} - ${dd}/${mo}/${yy}`
          } catch (e) {
            return ''
          }
        }
        
        function normalizeIngestedBy(it) {
          const raw = ((it && it.ingested_by) || '').toString().trim().toLowerCase()
          if (raw === 'monitor' || raw === 'telegram_search' || raw === 'telegram_add') return raw
          if (raw === 'telegram_manual') return 'telegram_add'
        
          const origin = ((it && it.origin) || '').toString().trim().toLowerCase()
          if (origin === 'telegram_search') return 'telegram_search'
          if (origin === 'telegram_manual' || origin === 'telegram_add') return 'telegram_add'
          if (origin === 'monitor' || origin === 'realtime') return 'monitor'
        
          const source = ((it && it.source) || '').toString().trim().toLowerCase()
          if (source === 'telegram') return 'telegram_add'
          if (source) return 'monitor'
          return 'desconocido'
        }
        
        function ingestedByLabel(val) {
          if (val === 'telegram_search') return 'busqueda de telegram'
          if (val === 'telegram_add') return 'agregado por telegram'
          if (val === 'monitor') return 'monitor'
          return 'desconocido'
        }
        
        function sendEngagement(itemId, action) {
          if (!itemId) return
          fetch(`/api/items/${itemId}/engagement`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action })
          }).catch(() => {})
        }
        
        function renderItem(it) {
          const el = document.createElement('div')
          el.className = 'list-group-item'
          const header = document.createElement('div')
          header.className = 'd-flex w-100 justify-content-between'
          const titleWrap = document.createElement('h5')
          titleWrap.className = 'mb-1'
          const emoji = document.createTextNode((it.emoji || '') + ' ')
          titleWrap.appendChild(emoji)
          if (it.url) {
            const a = document.createElement('a')
            a.href = it.url
            a.target = '_blank'
            a.rel = 'noopener noreferrer'
            a.className = 'news-link'
            a.dataset.itemId = String(it.id || '')
            a.textContent = it.title || '(sin título)'
            titleWrap.appendChild(a)
          } else {
            titleWrap.appendChild(document.createTextNode(it.title || '(sin título)'))
          }
          const metaSmall = document.createElement('small')
          metaSmall.textContent = formatDate(it.published_at) || ''
          header.appendChild(titleWrap)
          header.appendChild(metaSmall)
        
          const sub = document.createElement('p')
          sub.className = 'mb-1 text-muted'
          const ingestedBy = normalizeIngestedBy(it)
          const originLabel = ingestedByLabel(ingestedBy)
          const extracted = formatDate(it.extracted_at) || ''
          const fuente = it.source || ''
          sub.textContent = `Fuente: ${fuente} • Nivel: ${it.level} • Origen: ${originLabel} • Extraido: ${extracted}`
        
          const stats = document.createElement('div')
          stats.className = 'small text-muted'
          const views = Number(it.views_count || 0)
          const shares = Number(it.shares_count || 0)
          stats.textContent = `Vistas: ${views} • Compartidos: ${shares}`
        
          const actions = document.createElement('div')
          actions.className = 'mt-1'
          if (it.url) {
            const shareBtn = document.createElement('button')
            shareBtn.type = 'button'
            shareBtn.className = 'btn btn-outline-secondary btn-sm share-news-btn'
            shareBtn.dataset.itemId = String(it.id || '')
            shareBtn.dataset.url = String(it.url || '')
            shareBtn.dataset.title = String(it.title || '(sin título)')
            shareBtn.textContent = 'Compartir'
            actions.appendChild(shareBtn)
          }
        
          el.appendChild(header)
          el.appendChild(sub)
          el.appendChild(stats)
          if (actions.childNodes.length > 0) {
            el.appendChild(actions)
          }
          return el
        }
        
        fetch('/live')
          .then((r) => r.json())
          .then((items) => {
            allItems = items || []
            applyFilters()
          })
          .catch(() => {})
        
        if (typeof EventSource !== 'undefined') {
          const es = new EventSource('/stream')
          es.onmessage = function (evt) {
            try {
              const items = JSON.parse(evt.data)
              allItems = items || []
              applyFilters()
            } catch (e) {
              console.error(e)
            }
          }
        }
        
        liveList.addEventListener('click', async (evt) => {
          const target = evt.target
          if (!(target instanceof Element)) return
        
          if (target instanceof HTMLAnchorElement && target.classList.contains('news-link')) {
            const itemId = target.dataset.itemId || ''
            if (itemId) sendEngagement(itemId, 'view')
            return
          }
        
          if (target.classList.contains('share-news-btn')) {
            evt.preventDefault()
            const itemId = target.dataset.itemId || ''
            const url = target.dataset.url || ''
            const title = target.dataset.title || 'Noticia'
            if (!url) return
        
            try {
              if (navigator.share) {
                await navigator.share({ title, url })
              } else if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(url)
              }
              if (itemId) sendEngagement(itemId, 'share')
            } catch (e) {}
          }
        })
        
        function parseDateInput(v) {
          return v ? new Date(v) : null
        }
        function toDateOnly(d) {
          if (!d) return null
          return new Date(d.getFullYear(), d.getMonth(), d.getDate())
        }
        
        function computePresetRange(kind) {
          const now = new Date()
          const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate())
          if (kind === 'today') {
            const to = new Date(todayStart)
            to.setHours(23, 59, 59, 999)
            return { from: todayStart, to }
          }
          if (kind === 'week') {
            const day = now.getDay()
            const diffToMon = day === 0 ? 6 : day - 1
            const mon = new Date(todayStart)
            mon.setDate(mon.getDate() - diffToMon)
            const to = new Date()
            to.setHours(23, 59, 59, 999)
            return { from: mon, to }
          }
          if (kind === 'month') {
            const first = new Date(now.getFullYear(), now.getMonth(), 1)
            const to = new Date()
            to.setHours(23, 59, 59, 999)
            return { from: first, to }
          }
          return { from: null, to: null }
        }
        
        function handleRangeVisibility() {
          const pubRange = document.getElementById('filter-pub-range').value
          const pubFrom = document.getElementById('filter-pub-from')
          const pubTo = document.getElementById('filter-pub-to')
          if (pubRange === 'custom') {
            pubFrom.style.display = ''
            pubTo.style.display = ''
          } else {
            pubFrom.style.display = 'none'
            pubTo.style.display = 'none'
          }
          const extRange = document.getElementById('filter-ext-range').value
          const extFrom = document.getElementById('filter-ext-from')
          const extTo = document.getElementById('filter-ext-to')
          if (extRange === 'custom') {
            extFrom.style.display = ''
            extTo.style.display = ''
          } else {
            extFrom.style.display = 'none'
            extTo.style.display = 'none'
          }
        }
        
        document.getElementById('filter-pub-range').addEventListener('change', handleRangeVisibility)
        document.getElementById('filter-ext-range').addEventListener('change', handleRangeVisibility)
        
        handleRangeVisibility()
        
        const pageSize = 20
        let currentPage = 1
        let filteredItems = []
        
        function renderPage() {
          const total = filteredItems.length
          const totalPages = Math.max(1, Math.ceil(total / pageSize))
          if (currentPage > totalPages) currentPage = totalPages
          if (currentPage < 1) currentPage = 1
          const start = (currentPage - 1) * pageSize
          const end = start + pageSize
          const pageItems = filteredItems.slice(start, end)
        
          liveList.innerHTML = ''
          pageItems.forEach((it) => liveList.appendChild(renderItem(it)))
        
          document.getElementById('pagination-info').textContent = `Página ${currentPage} de ${totalPages} (${total} resultados)`
          document.getElementById('pagination-prev').disabled = currentPage <= 1
          document.getElementById('pagination-next').disabled = currentPage >= totalPages
        }
        
        document.getElementById('pagination-prev').addEventListener('click', (e) => {
          e.preventDefault()
          if (currentPage > 1) {
            currentPage--
            renderPage()
          }
        })
        document.getElementById('pagination-next').addEventListener('click', (e) => {
          e.preventDefault()
          const totalPages = Math.max(1, Math.ceil(filteredItems.length / pageSize))
          if (currentPage < totalPages) {
            currentPage++
            renderPage()
          }
        })
        
        function applyFilters() {
          currentPage = 1
          const q = (document.getElementById('filter-search').value || '').toLowerCase().trim()
          const lvlAlto = document.getElementById('lvl_alto').checked
          const lvlMedio = document.getElementById('lvl_medio').checked
          const lvlBajo = document.getElementById('lvl_bajo').checked
          const origin = document.getElementById('filter-origin').value
          const sourceQ = (document.getElementById('filter-source').value || '').toLowerCase().trim()
          let pubFrom = null,
            pubTo = null
          const pubRange = document.getElementById('filter-pub-range').value
          if (pubRange === 'custom') {
            pubFrom = parseDateInput(document.getElementById('filter-pub-from').value)
            pubTo = parseDateInput(document.getElementById('filter-pub-to').value)
          } else if (pubRange !== 'all') {
            const r = computePresetRange(pubRange)
            pubFrom = r.from
            pubTo = r.to
          }
        
          let extFrom = null,
            extTo = null
          const extRange = document.getElementById('filter-ext-range').value
          if (extRange === 'custom') {
            extFrom = parseDateInput(document.getElementById('filter-ext-from').value)
            extTo = parseDateInput(document.getElementById('filter-ext-to').value)
          } else if (extRange !== 'all') {
            const r = computePresetRange(extRange)
            extFrom = r.from
            extTo = r.to
          }
        
          const levelFilterActive = lvlAlto || lvlMedio || lvlBajo
        
          const filtered = allItems.filter((it) => {
            if (q) {
              const inTitle = (it.title || '').toLowerCase().includes(q)
              const inSummary = (it.summary || '').toLowerCase().includes(q)
              if (!inTitle && !inSummary) return false
            }
            if (levelFilterActive) {
              const rawLvl = (it.level || '').toLowerCase()
              let lvlNorm = rawLvl
              try {
                if (rawLvl.includes('alt')) lvlNorm = 'alto'
                else if (rawLvl.includes('med')) lvlNorm = 'medio'
                else if (rawLvl.includes('baj')) lvlNorm = 'bajo'
              } catch (e) {
                lvlNorm = rawLvl
              }
              if (lvlNorm === 'alto' && !lvlAlto) return false
              if (lvlNorm === 'medio' && !lvlMedio) return false
              if (lvlNorm === 'bajo' && !lvlBajo) return false
            }
            if (origin && origin !== 'all') {
              const o = normalizeIngestedBy(it)
              if (origin === 'desconocido') {
                if (o !== 'desconocido') return false
              } else if (o !== origin) return false
            }
            if (sourceQ) {
              const src = (it.source || '').toLowerCase()
              if (!src.includes(sourceQ)) return false
            }
        
            if (pubFrom || pubTo) {
              const pub = it.published_at ? new Date(it.published_at) : null
              if (pub) {
                if (pubFrom) {
                  if (pub < toDateOnly(pubFrom)) return false
                }
                if (pubTo) {
                  const end = new Date(toDateOnly(pubTo))
                  end.setHours(23, 59, 59, 999)
                  if (pub > end) return false
                }
              }
            }
            if (extFrom || extTo) {
              const ext = it.extracted_at ? new Date(it.extracted_at) : null
              if (ext) {
                if (extFrom) {
                  if (ext < toDateOnly(extFrom)) return false
                }
                if (extTo) {
                  const end = new Date(toDateOnly(extTo))
                  end.setHours(23, 59, 59, 999)
                  if (ext > end) return false
                }
              }
            }
            return true
          })
        
          filteredItems = filtered
          sortAndRender()
        }
        
        document.getElementById('filter-apply').addEventListener('click', (e) => {
          e.preventDefault()
          applyFilters()
        })
        document.getElementById('filter-reset').addEventListener('click', (e) => {
          e.preventDefault()
          document.getElementById('filter-search').value = ''
          document.getElementById('lvl_alto').checked = false
          document.getElementById('lvl_medio').checked = false
          document.getElementById('lvl_bajo').checked = false
          document.getElementById('filter-origin').value = 'all'
          document.getElementById('filter-source').value = ''
          document.getElementById('filter-pub-range').value = 'all'
          document.getElementById('filter-ext-range').value = 'all'
          document.getElementById('filter-pub-from').value = ''
          document.getElementById('filter-pub-to').value = ''
          document.getElementById('filter-ext-from').value = ''
          document.getElementById('filter-ext-to').value = ''
          handleRangeVisibility()
          applyFilters()
        })
        
        function safeDateVal(it, field) {
          try {
            const v = it[field]
            if (!v) return 0
            const d = new Date(v)
            return isNaN(d.getTime()) ? 0 : d.getTime()
          } catch (e) {
            return 0
          }
        }
        
        function sortItemsArray(arr) {
          const field = sortField
          const dir = sortDir === 'asc' ? 1 : -1
          arr.sort((a, b) => {
            const va = safeDateVal(a, field)
            const vb = safeDateVal(b, field)
            if (va === vb) return 0
            return va < vb ? -1 * dir : 1 * dir
          })
        }
        
        function sortAndRender() {
          sortItemsArray(filteredItems)
          renderPage()
        }
        
        function updateSortLabel() {
          const el = document.getElementById('current-sort')
          const friendly = sortField === 'published_at' ? 'Publicado' : 'Extraído'
          const arrow = sortDir === 'asc' ? '↑' : '↓'
          el.textContent = `${friendly} ${arrow}`
        }
        
        function setSort(field, dir) {
          sortField = field
          sortDir = dir
          try {
            localStorage.setItem('feed_sort', JSON.stringify({ field, dir }))
          } catch (e) {}
          document.querySelectorAll('.sort-btn').forEach((btn) => {
            const f = btn.getAttribute('data-field')
            const arrowEl = btn.querySelector('.sort-arrow')
            if (f === field) {
              btn.classList.remove('btn-outline-primary', 'btn-outline-secondary')
              if (f === 'published_at') btn.classList.add('btn-primary')
              else btn.classList.add('btn-secondary')
              btn.setAttribute('aria-pressed', 'true')
              if (arrowEl) arrowEl.textContent = dir === 'asc' ? '↑' : '↓'
            } else {
              btn.classList.remove('btn-primary', 'btn-secondary')
              if (f === 'published_at') btn.classList.add('btn-outline-primary')
              else btn.classList.add('btn-outline-secondary')
              btn.setAttribute('aria-pressed', 'false')
              if (arrowEl) arrowEl.textContent = ''
            }
          })
          updateSortLabel()
          sortAndRender()
        }
        
        document.querySelectorAll('.sort-btn').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.preventDefault()
            const field = btn.getAttribute('data-field')
            if (!field) return
            if (field === sortField) {
              sortDir = sortDir === 'asc' ? 'desc' : 'asc'
            } else {
              sortField = field
              sortDir = 'desc'
            }
            setSort(sortField, sortDir)
          })
        })
        
        try {
          const saved = JSON.parse(localStorage.getItem('feed_sort') || 'null')
          if (saved && saved.field) {
            sortField = saved.field
            sortDir = saved.dir === 'asc' ? 'asc' : 'desc'
          }
        } catch (e) {}
        
        setSort(sortField, sortDir)
      </script>
    </div>
  </body>
</html>
