<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard de Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    {% include 'navbar.html' %}

    <div class="container py-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Dashboard en tiempo real</h1>
        <button id="btn-refresh" class="btn btn-outline-secondary btn-sm">Actualizar</button>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label">Desde</label>
          <input id="f-from" type="date" class="form-control" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Hasta</label>
          <input id="f-to" type="date" class="form-control" />
        </div>
        <div class="col-md-2">
          <label class="form-label">Fuente</label>
          <select id="f-source" class="form-select">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Categoría</label>
          <select id="f-category" class="form-select">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Evolución</label>
          <select id="f-granularity" class="form-select">
            <option value="dia">Por día</option>
            <option value="semana">Por semana</option>
          </select>
        </div>
      </div>

      <div class="row g-3 align-items-end mb-3">
        <div class="col-md-8">
          <label class="form-label">Nivel</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="lvl-alto" checked />
              <label class="form-check-label" for="lvl-alto">alto</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="lvl-medio" checked />
              <label class="form-check-label" for="lvl-medio">medio</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="lvl-bajo" checked />
              <label class="form-check-label" for="lvl-bajo">bajo</label>
            </div>
          </div>
        </div>
        <div class="col-md-4 text-end">
          <button id="btn-apply" class="btn btn-primary">Aplicar filtros</button>
          <button id="btn-reset" class="btn btn-link">Reiniciar</button>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <div class="text-muted small">Noticias filtradas</div>
              <div id="kpi-items" class="display-6">0</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <div class="text-muted small">Vistas acumuladas</div>
              <div id="kpi-views" class="display-6">0</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <div class="text-muted small">Compartidos acumulados</div>
              <div id="kpi-shares" class="display-6">0</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-lg-4">
          <div class="card h-100">
            <div class="card-header">Distribución por nivel</div>
            <div class="card-body">
              <canvas id="chart-distribution" height="220"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card h-100">
            <div class="card-header">Evolución temporal</div>
            <div class="card-body">
              <canvas id="chart-timeline" height="220"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Top 10 noticias más vistas o compartidas</div>
        <div class="table-responsive">
          <table class="table table-striped mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Título</th>
                <th>Fuente</th>
                <th>Nivel</th>
                <th>Vistas</th>
                <th>Compartidos</th>
              </tr>
            </thead>
            <tbody id="top-body">
              <tr>
                <td colspan="6" class="text-muted">Sin datos.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
      const controls = {
        from: document.getElementById('f-from'),
        to: document.getElementById('f-to'),
        source: document.getElementById('f-source'),
        category: document.getElementById('f-category'),
        granularity: document.getElementById('f-granularity'),
        alto: document.getElementById('lvl-alto'),
        medio: document.getElementById('lvl-medio'),
        bajo: document.getElementById('lvl-bajo')
      }
      
      const kpiItems = document.getElementById('kpi-items')
      const kpiViews = document.getElementById('kpi-views')
      const kpiShares = document.getElementById('kpi-shares')
      const topBody = document.getElementById('top-body')
      
      let distChart = null
      let timelineChart = null
      let optionsLoaded = false
      let pendingTimer = null
      
      function selectedLevels() {
        const out = []
        if (controls.alto.checked) out.push('alto')
        if (controls.medio.checked) out.push('medio')
        if (controls.bajo.checked) out.push('bajo')
        return out
      }
      
      function buildQuery() {
        const q = new URLSearchParams()
        if (controls.from.value) q.set('from_date', controls.from.value)
        if (controls.to.value) q.set('to_date', controls.to.value)
        if (controls.source.value) q.set('source', controls.source.value)
        if (controls.category.value) q.set('category', controls.category.value)
        q.set('granularity', controls.granularity.value || 'dia')
      
        const levels = selectedLevels()
        if (levels.length > 0) q.set('levels', levels.join(','))
        return q.toString()
      }
      
      function formatCategoryLabel(value) {
        const txt = String(value || '').trim()
        if (!txt) return ''
        return txt.charAt(0).toLocaleUpperCase('es-ES') + txt.slice(1).toLocaleLowerCase('es-ES')
      }
      
      function updateSelectOptions(selectEl, values, keepValue) {
        const previous = keepValue || selectEl.value || ''
        selectEl.innerHTML = ''
      
        const baseOpt = document.createElement('option')
        baseOpt.value = ''
        baseOpt.textContent = 'Todas'
        selectEl.appendChild(baseOpt)
        ;(values || []).forEach((v) => {
          const op = document.createElement('option')
          op.value = v
          if (selectEl === controls.category) {
            op.textContent = formatCategoryLabel(v)
          } else {
            op.textContent = v
          }
          if (v === previous) op.selected = true
          selectEl.appendChild(op)
        })
      }
      
      function ensureCharts() {
        if (!distChart) {
          const ctx = document.getElementById('chart-distribution')
          distChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: ['alto', 'medio', 'bajo'],
              datasets: [
                {
                  data: [0, 0, 0],
                  backgroundColor: ['#dc3545', '#fd7e14', '#198754']
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false
            }
          })
        }
      
        if (!timelineChart) {
          const ctx = document.getElementById('chart-timeline')
          timelineChart = new Chart(ctx, {
            type: 'line',
            data: {
              labels: [],
              datasets: [
                { label: 'alto', borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,0.2)', data: [], tension: 0.25 },
                { label: 'medio', borderColor: '#fd7e14', backgroundColor: 'rgba(253,126,20,0.2)', data: [], tension: 0.25 },
                { label: 'bajo', borderColor: '#198754', backgroundColor: 'rgba(25,135,84,0.2)', data: [], tension: 0.25 }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: {
                  beginAtZero: true,
                  ticks: { precision: 0 }
                }
              }
            }
          })
        }
      }
      
      function renderTop(items) {
        topBody.innerHTML = ''
        const rows = Array.isArray(items) ? items : []
        if (rows.length === 0) {
          const tr = document.createElement('tr')
          tr.innerHTML = '<td colspan="6" class="text-muted">Sin datos para los filtros seleccionados.</td>'
          topBody.appendChild(tr)
          return
        }
      
        rows.forEach((it, idx) => {
          const tr = document.createElement('tr')
          const title = (it.title || '(sin título)').toString()
          const url = (it.url || '').toString()
          const titleHtml = url ? '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + title + '</a>' : title
      
          tr.innerHTML = '<td>' + (idx + 1) + '</td>' + '<td>' + titleHtml + '</td>' + '<td>' + (it.source || '') + '</td>' + '<td>' + (it.level || 'medio') + '</td>' + '<td>' + (it.views_count || 0) + '</td>' + '<td>' + (it.shares_count || 0) + '</td>'
          topBody.appendChild(tr)
        })
      }
      
      async function loadDashboard() {
        ensureCharts()
        const query = buildQuery()
        const res = await fetch('/api/dashboard' + (query ? '?' + query : ''))
        const data = await res.json()
        if (!data || !data.ok) return
      
        if (!optionsLoaded) {
          updateSelectOptions(controls.source, (data.options && data.options.sources) || [], controls.source.value)
          updateSelectOptions(controls.category, (data.options && data.options.categories) || [], controls.category.value)
          optionsLoaded = true
        }
      
        const dist = data.distribution || {}
        distChart.data.datasets[0].data = [dist.alto || 0, dist.medio || 0, dist.bajo || 0]
        distChart.update('none')
      
        const timeline = data.timeline || {}
        const labels = timeline.labels || []
        const series = timeline.series || {}
        timelineChart.data.labels = labels
        timelineChart.data.datasets[0].data = series.alto || []
        timelineChart.data.datasets[1].data = series.medio || []
        timelineChart.data.datasets[2].data = series.bajo || []
        timelineChart.update('none')
      
        const totals = data.totals || {}
        kpiItems.textContent = totals.items || 0
        kpiViews.textContent = totals.views || 0
        kpiShares.textContent = totals.shares || 0
      
        renderTop(data.top || [])
      }
      
      function loadDashboardDebounced() {
        if (pendingTimer) clearTimeout(pendingTimer)
        pendingTimer = setTimeout(() => {
          loadDashboard().catch(() => {})
        }, 300)
      }
      
      document.getElementById('btn-apply').addEventListener('click', (e) => {
        e.preventDefault()
        loadDashboard().catch(() => {})
      })
      
      document.getElementById('btn-reset').addEventListener('click', (e) => {
        e.preventDefault()
        controls.from.value = ''
        controls.to.value = ''
        controls.source.value = ''
        controls.category.value = ''
        controls.granularity.value = 'dia'
        controls.alto.checked = true
        controls.medio.checked = true
        controls.bajo.checked = true
        loadDashboard().catch(() => {})
      })
      
      document.getElementById('btn-refresh').addEventListener('click', (e) => {
        e.preventDefault()
        loadDashboard().catch(() => {})
      })
      ;[controls.from, controls.to, controls.source, controls.category, controls.granularity, controls.alto, controls.medio, controls.bajo].forEach((el) => {
        el.addEventListener('change', () => loadDashboardDebounced())
      })
      
      if (typeof EventSource !== 'undefined') {
        const es = new EventSource('/stream')
        es.onmessage = function () {
          loadDashboardDebounced()
        }
      }
      
      setInterval(() => {
        loadDashboard().catch(() => {})
      }, 30000)
      
      loadDashboard().catch(() => {})
    </script>
  </body>
</html>
